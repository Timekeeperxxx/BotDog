# MediaMTX configuration (Windows local)
# Docs: https://github.com/bluenviron/mediamtx

logLevel: info

# RTSP server (ingest)
rtsp: yes
rtspAddress: :8554
# avoid UDP ports that conflict with backend on 8000
rtspTransports:
  - tcp

# WHEP server
webrtc: yes
webrtcAddress: :8889
webrtcEncryption: false

# Allow local WHEP/WHIP by default
webrtcAllowOrigins:
  - "*"

# WHEP paths (explicit for clarity)
webrtcAdditionalHosts:
  - 127.0.0.1
  - 192.168.144.30

paths:
  cam:
    source: publisher
  cam2:
    source: rtsp://192.168.144.26:8554/main.264
    sourceProtocol: tcp
